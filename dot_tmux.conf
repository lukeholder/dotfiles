# tmux Configuration
# Location: ~/.tmux.conf
# Managed by chezmoi — edit with: chezmoi edit ~/.tmux.conf

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
# Use Ctrl+a instead of Ctrl+b (screen-style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Start window and pane indices from 1
set -g base-index 1
setw -g pane-base-index 1

# Automatically re-number windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Reduce escape-key delay (important for Vim/Neovim)
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# Focus events (needed for Vim autoread)
set -g focus-events on

# ---------------------------------------------------------------------------
# Key Bindings
# ---------------------------------------------------------------------------
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with capital HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Copy Mode (Vim keys)
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Status Bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#585b70]│ "
set -g status-right "#[fg=#585b70]│ #[fg=#a6e3a1]#{?pane_synchronized,SYNC ,}#[fg=#cdd6f4]%H:%M #[fg=#585b70]│ #[fg=#cdd6f4]%d %b"

setw -g window-status-format "#[fg=#585b70] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W#{?window_zoomed_flag, 󰊓,} "

# Pane border
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#313244,fg=#cdd6f4"
